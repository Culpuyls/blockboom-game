<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockBoom - Culpuyls Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        h1 { font-size: 3rem; color: #03dac6; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #bb86fc;
            border: 2px solid #bb86fc;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #bb86fc;
            color: #121212;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BlockBoom</h1>
        <p>¡Disfruta del modo IA, combos multiplicadores y colores modernos sin conexión!</p>
        <!-- Aquí podrás meter el juego en HTML5, tus enlaces de descarga o la privacidad -->
        <a href="https://culpuyls.github.io" class="btn">Volver a Culpuyls Studio</a>
    </div>

</body>
</html>
